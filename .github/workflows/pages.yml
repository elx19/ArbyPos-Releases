name: Publicar sitio ArbyPos

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "legal.css"
      - "app.js"
      - "privacy.html"
      - "license.html"
      - "robots.txt"
      - "sitemap.xml"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
